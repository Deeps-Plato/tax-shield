services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tax_shield
      POSTGRES_USER: tax_shield
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taxshield_dev_2024}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tax_shield"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
